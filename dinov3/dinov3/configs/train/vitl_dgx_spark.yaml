optim:
  epochs: 100
  lr: 0.001
  min_lr: 0.001
  weight_decay: 0.04
  weight_decay_end: 0.4
  clip_grad: 3.0

  # optimizer: adamw
  # warmup_epochs: 10
  # freeze_last_layer_epochs: 1
  # scaling_rule: sqrt_wrt_1024
  # patch_embed_lr_mult: 0.2
  # dino_head_wd_multiplier: 1.0
  # layerwise_decay: 0.9
  # multi_tensor_optim: true
  # dump_fsdp_weights_path: ''
  # adamw_beta1: 0.9
  # adamw_beta2: 0.999
crops:
  global_crops_scale:
  - 0.32
  - 1.0
  local_crops_number: 8
  local_crops_scale:
  - 0.05
  - 0.32
  global_crops_size: 512 # Global crop size; in our case use 512
  local_crops_size: 128
  share_color_jitter: false
  horizontal_flips: true

  # localcrops_subset_of_globalcrops: false

  # learn_from_teacher_tokens: false
  # centering: sinkhorn_knopp
  # checkpointing: false
  # compile: true
  # cudagraphs: false
  # cell_augmentation: false
  # cell_augmentation_type: hpa
student:
  arch: vit_large
  patch_size: 16
  drop_path_rate: 0.4
  layerscale: 1.0e-05
  ffn_layer: mlp
  fp8_enabled: True
  fp8_filter: "blocks"
  pretrained_weights: '/workspace/weights/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth' 

  # CUSTOM CONFIGS
  # block_chunks: 0                   
  # num_register_tokens: 4
